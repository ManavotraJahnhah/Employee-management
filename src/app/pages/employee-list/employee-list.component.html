<div class="container py-5">

  <div class="row">
    <div class="col-lg-12">

      <div class="card shadow-sm border-0">

        <!-- Header -->
        <div class="card-header bg-primary text-white py-3">
          <h2 class="mb-0">
            <i class="bi bi-people-fill"></i>
            Employee List
          </h2>
        </div>
        
    <div class="row">
        <!-- search box -->
        <div class="toolbar-item col-sm-3 col-md-5 p-4">
            <wj-flex-grid-search [placeholder]="'Search'" [grid]="flex" cssMatch="">
            </wj-flex-grid-search>
        </div>
    </div>

        <!-- Body -->
        <div class="card-body p-4">

          <!-- Empty -->
          <div *ngIf="employees.length === 0" class="alert alert-warning">
            <i class="bi bi-exclamation-circle-fill"></i>
            <strong>No employees found.</strong>
          </div>

          <!-- Wijmo Grid -->
<wj-flex-grid
  *ngIf="employees.length > 0"
  #flex
  class="employee-grid"
  [itemsSource]="employees"
  [autoGenerateColumns]="false"
  [isReadOnly]="false"
  [allowAddNew]="false"
  [allowDelete]="true"
  [allowSorting]="true"
  [allowDragging]="'Both'"
  [allowResizing]="'Both'"
  [selectionMode]="'RowRange'"
  [showMarquee]="true"
  [headersVisibility]="'All'"
  [stickyHeaders]="true"
>

  <wj-flex-grid-column header="Name" binding="name" [width]="180"></wj-flex-grid-column>

  <wj-flex-grid-column header="Surname" binding="surname" [width]="180"></wj-flex-grid-column>

  <wj-flex-grid-column binding="date" header="Date" format="MMM d yyyy" [isRequired]="false" [width]="130"
    [editor]="theInputDate" binding="date">
</wj-flex-grid-column>

  <wj-flex-grid-column header="Department" binding="department" [width]="180"></wj-flex-grid-column>

  <wj-flex-grid-column header="Daily Salary" binding="dailySalaryFormatted" align="right" [width]="140"></wj-flex-grid-column>

  <wj-flex-grid-column header="Salary Handling" binding="salaryHandling" [width]="160"></wj-flex-grid-column>

  <wj-flex-grid-column header="Actions" [width]="170" align="center">

    <ng-template wjFlexGridCellTemplate [cellType]="'Cell'" let-row="row">

      <i class="bi bi-eye text-primary me-3 action-icon"
         (click)="viewEmployee(row.dataItem.id)"
         title="View"></i>

      <i class="bi bi-pencil me-3 action-icon"
         (click)="editEmployee(row.dataItem.id)"
         title="Update"></i>

      <i class="bi bi-trash text-danger action-icon"
         (click)="deleteEmployee(row.dataItem.id)"
         title="Delete"></i>

    </ng-template>

  </wj-flex-grid-column>

</wj-flex-grid>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- Modal -->
<ng-container *ngIf="selectedEmployee">
  <app-employee-view-modal
    [employee]="selectedEmployee"
    (close)="closeModal()"
  ></app-employee-view-modal>
</ng-container>

<!-- custom editors -->
<wj-input-date #theInputDate format="MM/dd/yyyy" [isRequired]="false">
</wj-input-date>
<wj-input-time #theInputTime format="HH:mm" [isRequired]="false">
</wj-input-time>
